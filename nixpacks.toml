[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.intl", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.session", "composer"]

[phases.build]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php82 -S 0.0.0.0:$PORT -t public/"