[phases.setup] 
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.intl", "php82Extensions.curl", "php82Extensions.zip", "composer"] 
[phases.build] 
cmds = ["composer install --ignore-platform-reqs --no-scripts --no-interaction"] 
[start] 
cmd = "php82 -S 0.0.0.0:$PORT -t public/" 
