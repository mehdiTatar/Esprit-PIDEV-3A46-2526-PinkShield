# ── Image Uploads ────────────────────────────────────────────
# Path to the root directory used for image uploads.
# Images are stored under: {this dir}/uploads/blog/
# and the DB value is:     /uploads/blog/{filename}
#
# Leave blank to use the project folder automatically.
# Set to Symfony's public/ directory when ready to share:
#   symfony.public.dir=C:/wamp64/www/pinkshield/public
#   symfony.public.dir=C:/xampp/htdocs/pinkshield/public
#
symfony.public.dir=

